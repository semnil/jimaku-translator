name: CI
run-name: ${{ github.ref_name }} CI ✅

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test 🧪
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Dependencies 📦
        run: npm ci

      - name: Build 🛠️
        run: npm run build

      - name: Run Tests ✅
        run: npm test
