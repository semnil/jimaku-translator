<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Audio waveform (5 bars, thick, centered upper) -->
  <g transform="translate(128, 96)" stroke="url(#wave)" stroke-width="12" stroke-linecap="round" fill="none">
    <line x1="-48" y1="-16" x2="-48" y2="16"/>
    <line x1="-24" y1="-40" x2="-24" y2="40"/>
    <line x1="0" y1="-52" x2="0" y2="52"/>
    <line x1="24" y1="-36" x2="24" y2="36"/>
    <line x1="48" y1="-20" x2="48" y2="20"/>
  </g>

  <!-- Subtitle bar -->
  <rect x="32" y="168" width="192" height="56" rx="12" ry="12" fill="#0f1629" opacity="0.9"/>
  <rect x="32" y="168" width="192" height="56" rx="12" ry="12" fill="none" stroke="#4ade80" stroke-width="3" opacity="0.6"/>

  <!-- Three subtitle lines -->
  <rect x="56" y="182" width="144" height="6" rx="3" fill="#4ade80" opacity="0.9"/>
  <rect x="72" y="196" width="112" height="6" rx="3" fill="#4ade80" opacity="0.5"/>
  <rect x="64" y="210" width="128" height="6" rx="3" fill="#a78bfa" opacity="0.5"/>
</svg>
