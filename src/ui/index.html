<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>jimaku-translator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 14px;
  line-height: 1.5;
  overflow-y: auto;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
  color: #fff;
}

h2 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: #a0a0c0;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Status panel */
.status-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.status-card {
  background: #16213e;
  border-radius: 8px;
  padding: 14px;
  border: 1px solid #2a2a4a;
}

.status-card .label {
  font-size: 11px;
  color: #8888aa;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

.status-card .value {
  font-size: 16px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.indicator {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

.indicator.on { background: #4ade80; box-shadow: 0 0 6px #4ade8066; }
.indicator.off { background: #666; }
.indicator.warn { background: #fbbf24; box-shadow: 0 0 6px #fbbf2466; }

/* Level meter */
.level-meter {
  margin-top: 8px;
  height: 6px;
  background: #0f1629;
  border-radius: 3px;
  overflow: hidden;
}
.level-bar {
  height: 100%;
  width: 0%;
  border-radius: 3px;
  background: #4ade80;
  transition: width 0.15s ease-out, background 0.15s;
}
.level-bar.hot { background: #fbbf24; }
.level-bar.clip { background: #ef4444; }
.level-label {
  font-size: 11px;
  color: #808090;
  margin-top: 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.capture-btn {
  font-size: 10px;
  padding: 1px 6px;
  background: #2a2a4a;
  color: #a0a0c0;
  border: 1px solid #3a3a5a;
  border-radius: 3px;
  cursor: pointer;
}
.capture-btn:hover { background: #3a3a5a; }
.capture-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Last result */
.result-panel {
  background: #16213e;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 24px;
  border: 1px solid #2a2a4a;
  /* Fixed to fit one JA line + one EN line. Prevents height jump between empty and filled state. */
  height: 125px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.result-panel .lang {
  font-size: 11px;
  color: #8888aa;
  margin-bottom: 2px;
}

.result-panel .text {
  font-size: 15px;
  margin-bottom: 8px;
  word-break: break-all;
}

.result-panel .text.ja { color: #fff; }
.result-panel .text.en { color: #a0c4ff; }
.result-panel .empty { color: #555; font-style: italic; }

/* Config form */
.config-section {
  background: #16213e;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid #2a2a4a;
}

.config-section h3 {
  font-size: 13px;
  font-weight: 600;
  color: #c0c0e0;
  margin-bottom: 10px;
  cursor: pointer;
  user-select: none;
}

.config-section h3::before {
  content: '▼';
  display: inline-block;
  margin-right: 6px;
  font-size: 10px;
  transition: transform 0.15s;
}

.config-section.collapsed h3::before {
  transform: rotate(-90deg);
}

.config-section.collapsed h3 {
  margin-bottom: 0;
}

.config-section.collapsed .section-body {
  display: none;
}

.field {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  gap: 8px;
}

.field:last-child { margin-bottom: 0; }

.field label {
  flex: 0 0 140px;
  font-size: 12px;
  color: #9999bb;
  text-align: right;
}

.field input {
  flex: 1;
  background: #0f1629;
  border: 1px solid #333366;
  border-radius: 4px;
  padding: 6px 10px;
  color: #e0e0e0;
  font-size: 13px;
  font-family: "Consolas", "SF Mono", monospace;
}

.field input:focus, .field select:focus {
  outline: none;
  border-color: #6366f1;
  box-shadow: 0 0 0 2px #6366f133;
}

.field select {
  flex: 1;
  background: #0f1629;
  border: 1px solid #333366;
  border-radius: 4px;
  padding: 6px 10px;
  color: #e0e0e0;
  font-size: 13px;
  font-family: "Consolas", "SF Mono", monospace;
}

.field input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: #2a2a4a;
  border-radius: 2px;
  outline: none;
  padding: 0;
}
.field input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  background: #6366f1;
  border-radius: 50%;
  cursor: pointer;
  border: none;
}
.field input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  background: #6366f1;
  border-radius: 50%;
  cursor: pointer;
  border: none;
}

.field input[type="number"] {
  max-width: 120px;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

button {
  padding: 8px 20px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}

button.primary {
  background: #6366f1;
  color: #fff;
}
button.primary:hover:not(:disabled) { background: #4f46e5; }
button.primary:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }

button.secondary {
  background: #2a2a4a;
  color: #ccc;
}
button.secondary:hover:not(:disabled) { background: #3a3a5a; }
button.secondary:disabled { background: #2a2a4a; color: #666; cursor: not-allowed; opacity: 0.5; }

/* Config wrapper toggle */
.config-toggle {
  cursor: pointer;
  user-select: none;
}

.config-toggle::before {
  content: '▼';
  display: inline-block;
  margin-right: 6px;
  font-size: 10px;
  transition: transform 0.15s;
}

.config-wrapper.collapsed .config-toggle::before {
  transform: rotate(-90deg);
}

.config-wrapper.collapsed .config-body {
  display: none;
}

/* Log panel */
.log-section { margin-top: 32px; }

.log-toggle {
  cursor: pointer;
  user-select: none;
}

.log-toggle::before {
  content: '▶';
  display: inline-block;
  margin-right: 6px;
  transition: transform 0.15s;
  font-size: 10px;
}

.log-toggle.open::before {
  transform: rotate(90deg);
}

.log-panel {
  background: #0f1629;
  border-radius: 8px;
  padding: 10px;
  margin-top: 8px;
  border: 1px solid #2a2a4a;
  max-height: 200px;
  overflow-y: auto;
  font-family: "Consolas", "SF Mono", monospace;
  font-size: 11px;
  color: #888;
  line-height: 1.6;
  display: none;
}

.log-panel.open { display: block; }

.log-panel .entry { white-space: pre-wrap; word-break: break-all; }
.log-panel .entry .ts { color: #555; margin-right: 6px; }
.log-panel .entry.error { color: #f87171; }

/* Toast notification */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  color: #fff;
  padding: 10px 18px;
  border-radius: 6px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.error { background: #ef4444; }
</style>
</head>
<body>
<div class="container">


  <!-- Status -->
  <h2>Status</h2>
  <div class="status-grid">
    <div class="status-card">
      <div class="label" data-i18n="input_label">Input</div>
      <div class="value">
        <span class="indicator off" id="vban-indicator"></span>
        <span id="vban-status">--</span>
      </div>
      <div class="level-meter" id="vban-level-meter">
        <div class="level-bar" id="vban-level-bar"></div>
      </div>
      <div class="level-label">
        <span id="vban-level-text"></span>
        <button type="button" class="capture-btn" id="capture-btn" onclick="captureAudio()" data-i18n="capture_btn">Capture 5s WAV</button>
      </div>
    </div>
    <div class="status-card">
      <div class="label">OBS</div>
      <div class="value">
        <span class="indicator off" id="obs-indicator"></span>
        <span id="obs-status">--</span>
      </div>
    </div>
    <div class="status-card">
      <div class="label">Whisper</div>
      <div class="value">
        <span class="indicator off" id="whisper-indicator"></span>
        <span id="whisper-status">--</span>
      </div>
    </div>
  </div>

  <!-- Last result -->
  <h2>Last Recognition</h2>
  <div class="result-panel" id="result-panel">
    <div class="empty" data-i18n="waiting">Waiting for speech...</div>
  </div>

  <!-- Config -->
  <div class="config-wrapper" id="config-wrapper">
  <h2 class="config-toggle" id="config-toggle" data-i18n="configuration">Configuration</h2>
  <form id="config-form" class="config-body">
    <div class="config-section" data-section="vban">
      <h3>VBAN</h3>
      <div class="section-body">
      <div class="field">
        <label for="cfg-vban-port" data-i18n="vban_port">Port</label>
        <input type="number" id="cfg-vban-port" min="1" max="65535">
      </div>
      <div class="field">
        <label for="cfg-vban-stream" data-i18n="vban_stream">Stream Name</label>
        <input type="text" id="cfg-vban-stream" data-i18n-placeholder="vban_stream_ph" placeholder="(empty = all)">
      </div>
      </div>
    </div>

    <div class="config-section" data-section="obs">
      <h3>OBS WebSocket</h3>
      <div class="section-body">
      <div class="field">
        <label for="cfg-obs-host" data-i18n="obs_host">Host</label>
        <input type="text" id="cfg-obs-host">
      </div>
      <div class="field">
        <label for="cfg-obs-port" data-i18n="obs_port">Port</label>
        <input type="number" id="cfg-obs-port" min="1" max="65535">
      </div>
      <div class="field">
        <label for="cfg-obs-password" data-i18n="obs_password">Password</label>
        <input type="password" id="cfg-obs-password" data-i18n-placeholder="obs_password_ph" placeholder="(empty = none)">
      </div>
      <div class="field">
        <label for="cfg-obs-source-ja" data-i18n="obs_source_ja">JA Text Source</label>
        <select id="cfg-obs-source-ja"><option value="">(none)</option></select>
      </div>
      <div class="field">
        <label for="cfg-obs-source-en" data-i18n="obs_source_en">EN Text Source</label>
        <select id="cfg-obs-source-en"><option value="">(none)</option></select>
      </div>
      <div class="field">
        <label for="cfg-obs-cc" data-i18n="obs_cc">Closed Caption</label>
        <div style="flex:1;display:flex;gap:8px;align-items:center;">
          <input type="checkbox" id="cfg-obs-cc" style="flex:0;width:16px;height:16px;">
          <select id="cfg-obs-cc-lang" style="width:110px;">
            <option value="en" data-i18n="lang_en">English</option>
            <option value="ja" data-i18n="lang_ja">Japanese</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label></label>
        <div style="display:flex;gap:6px;">
          <button type="button" class="secondary" id="refresh-sources-btn" style="padding:4px 12px;font-size:12px;" data-i18n="refresh_sources">Refresh Sources</button>
          <button type="button" class="secondary" id="reconnect-obs-btn" style="padding:4px 12px;font-size:12px;" data-i18n="reconnect">Reconnect</button>
        </div>
      </div>
      </div>
    </div>

    <div class="config-section" data-section="whisper">
      <h3 data-i18n="whisper_section">Whisper</h3>
      <div class="section-body">
      <div class="field">
        <label data-i18n="whisper_binary">Binary</label>
        <div style="flex:1;min-width:0;display:flex;gap:6px;align-items:center;">
          <select id="cfg-whisper-variant" style="flex:1;min-width:0;"></select>
          <button type="button" class="secondary" id="download-binary-btn" style="padding:4px 12px;font-size:12px;white-space:nowrap;" data-i18n="download">Download</button>
        </div>
      </div>
      <div class="field">
        <label data-i18n="whisper_model">Model</label>
        <div style="flex:1;min-width:0;display:flex;gap:6px;align-items:center;">
          <select id="cfg-whisper-model-select" style="flex:1;min-width:0;"></select>
          <button type="button" class="secondary" id="download-model-btn" style="padding:4px 12px;font-size:12px;white-space:nowrap;" data-i18n="download">Download</button>
        </div>
      </div>
      <div id="download-progress-container" style="margin-top:8px;display:flex;flex-direction:column;gap:6px;"></div>
      </div>
    </div>

    <div class="config-section" data-section="subtitle">
      <h3 data-i18n="subtitle_section">Subtitle</h3>
      <div class="section-body">
      <div class="field">
        <label for="cfg-subtitle-delay" data-i18n="subtitle_delay">Clear Delay (sec)</label>
        <input type="number" id="cfg-subtitle-delay" min="0" step="0.5">
      </div>
      <div class="field">
        <label for="cfg-subtitle-chars" data-i18n="subtitle_chars">Chars per Line</label>
        <input type="number" id="cfg-subtitle-chars" min="0">
      </div>
      </div>
    </div>

    <div class="config-section" data-section="vad">
      <h3 data-i18n="vad_section">Voice Detection</h3>
      <div class="section-body">
      <div class="field">
        <label for="cfg-vad-threshold" data-i18n="vad_threshold">Threshold</label>
        <div style="flex:1;display:flex;gap:10px;align-items:center;">
          <input type="range" id="cfg-vad-threshold" min="0" max="1" step="0.05" style="flex:1;">
          <span id="cfg-vad-threshold-value" style="min-width:36px;text-align:right;font-variant-numeric:tabular-nums;color:#c0c0e0;">0.50</span>
        </div>
      </div>
      <div class="field">
        <label for="cfg-vad-min-speech" data-i18n="vad_min_speech">Min Speech (ms)</label>
        <input type="number" id="cfg-vad-min-speech" min="0" step="100">
      </div>
      <div class="field">
        <label for="cfg-vad-max-speech" data-i18n="vad_max_speech">Max Speech (ms)</label>
        <input type="number" id="cfg-vad-max-speech" min="100" step="100">
      </div>
      </div>
    </div>

    <div class="config-section" data-section="audio">
      <h3 data-i18n="audio_section">Audio</h3>
      <div class="section-body">
      <div class="field">
        <label for="cfg-audio-gate" data-i18n="audio_gate">RMS Gate (dBFS)</label>
        <div style="flex:1;display:flex;gap:10px;align-items:center;">
          <input type="range" id="cfg-audio-gate" min="-90" max="-30" step="1" style="flex:1;">
          <span id="cfg-audio-gate-value" style="min-width:36px;text-align:right;font-variant-numeric:tabular-nums;color:#c0c0e0;">-60</span>
        </div>
      </div>
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="primary" id="save-btn" data-i18n="save">Save</button>
      <button type="button" class="secondary" id="reload-btn" data-i18n="reload">Reload</button>
    </div>
  </form>
  </div>

  <!-- Log -->
  <div class="log-section">
    <h2 class="log-toggle" id="log-toggle" data-i18n="log">Log</h2>
    <div class="log-panel" id="log-panel"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // --- i18n ---
  var i18n = {
    en: {
      input_label: 'Input',
      waiting: 'Waiting for speech...',
      capture_btn: 'Capture 5s WAV', configuration: 'Configuration', log: 'Log',
      save: 'Save', reload: 'Reload',
      lang_en: 'English', lang_ja: 'Japanese',
      vban_port: 'Port', vban_stream: 'Stream Name', vban_stream_ph: '(empty = all)',
      obs_host: 'Host', obs_port: 'Port', obs_password: 'Password', obs_password_ph: '(empty = none)',
      obs_source_ja: 'Japanese Text Source', obs_source_en: 'English Text Source', obs_cc: 'Closed Caption',
      refresh_sources: 'Refresh Sources', reconnect: 'Reconnect',
      whisper_section: 'Whisper', whisper_binary: 'Binary', whisper_model: 'Model', download: 'Download',
      subtitle_section: 'Subtitle', subtitle_delay: 'Clear Delay (sec)', subtitle_chars: 'Chars per Line',
      vad_section: 'Voice Detection', vad_threshold: 'Threshold',
      vad_min_speech: 'Min Speech (ms)', vad_max_speech: 'Max Speech (ms)',
      audio_section: 'Audio', audio_gate: 'RMS Gate (dBFS)',
    },
    ja: {
      input_label: '入力',
      waiting: '音声を待機中...',
      capture_btn: '5秒キャプチャ', configuration: '設定', log: 'ログ',
      save: '保存', reload: '再読込',
      lang_en: '英語', lang_ja: '日本語',
      vban_port: 'ポート', vban_stream: 'ストリーム名', vban_stream_ph: '(空 = すべて受信)',
      obs_host: 'ホスト', obs_port: 'ポート', obs_password: 'パスワード', obs_password_ph: '(空 = なし)',
      obs_source_ja: '日本語テキストソース', obs_source_en: '英語テキストソース', obs_cc: 'クローズドキャプション',
      refresh_sources: 'ソース更新', reconnect: '再接続',
      whisper_section: 'Whisper', whisper_binary: 'バイナリ', whisper_model: 'モデル', download: 'ダウンロード',
      subtitle_section: '字幕', subtitle_delay: '消去までの待機 (秒)', subtitle_chars: '1行の文字数',
      vad_section: '音声検出', vad_threshold: 'しきい値',
      vad_min_speech: '最短発話 (ms)', vad_max_speech: '最長発話 (ms)',
      audio_section: 'オーディオ', audio_gate: 'RMS ゲート (dBFS)',
    }
  };

  var currentLang = /^ja\b/i.test(navigator.language) ? 'ja' : 'en';

  function applyI18n(lang) {
    var dict = i18n[lang] || i18n.en;
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.getAttribute('data-i18n');
      if (dict[key]) el.textContent = dict[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
      var key = el.getAttribute('data-i18n-placeholder');
      if (dict[key]) el.placeholder = dict[key];
    });
  }

  applyI18n(currentLang);

  const MAX_LOG_ENTRIES = 200;
  const logPanel = document.getElementById('log-panel');
  const logToggle = document.getElementById('log-toggle');

  // --- Window height tracking for collapse/expand ---
  var maxWindowHeight = window.outerHeight;
  var WIN_HEIGHT_KEY = 'jimaku-translator-max-height';
  try {
    var saved = parseInt(localStorage.getItem(WIN_HEIGHT_KEY), 10);
    if (saved > 0) maxWindowHeight = saved;
  } catch(e) {}

  var container = document.querySelector('.container');
  var fitPending = false;
  var resizeFromFit = false;

  function getContainerPadding() {
    var cs = getComputedStyle(container);
    return parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
  }

  function fitWindowHeight() {
    if (fitPending) return;
    fitPending = true;
    requestAnimationFrame(function() {
      fitPending = false;
      var contentHeight = container.offsetHeight + getContainerPadding();
      var chrome = window.outerHeight - window.innerHeight;
      var desired = Math.min(contentHeight + chrome, maxWindowHeight);
      if (Math.abs(desired - window.outerHeight) > 2) {
        resizeFromFit = true;
        window.resizeTo(window.outerWidth, desired);
      }
    });
  }

  // Track user-initiated resizes as the new max height
  window.addEventListener('resize', function() {
    if (resizeFromFit) {
      resizeFromFit = false;
      return;
    }
    if (window.outerHeight > maxWindowHeight) {
      maxWindowHeight = window.outerHeight;
      try { localStorage.setItem(WIN_HEIGHT_KEY, String(maxWindowHeight)); } catch(e) {}
    }
  });

  // --- Collapse utility ---
  var COLLAPSE_KEY = 'jimaku-translator-collapsed';
  var collapsed = {};
  try { collapsed = JSON.parse(localStorage.getItem(COLLAPSE_KEY)) || {}; } catch(e) {}

  function saveCollapsed() {
    try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify(collapsed)); } catch(e) {}
  }

  function setupCollapse(key, el, toggle, onToggle) {
    if (collapsed[key]) el.classList.add('collapsed');
    toggle.addEventListener('click', function() {
      el.classList.toggle('collapsed');
      collapsed[key] = el.classList.contains('collapsed');
      saveCollapsed();
      if (onToggle) onToggle();
      fitWindowHeight();
    });
  }

  // Configuration wrapper
  setupCollapse('_config', document.getElementById('config-wrapper'), document.getElementById('config-toggle'));

  // Config sub-sections
  document.querySelectorAll('.config-section[data-section]').forEach(function(sec) {
    setupCollapse(sec.getAttribute('data-section'), sec, sec.querySelector('h3'));
  });

  // Log panel (uses 'open' class instead of 'collapsed')
  if (collapsed._log) { logToggle.classList.add('open'); logPanel.classList.add('open'); }
  logToggle.addEventListener('click', function() {
    logToggle.classList.toggle('open');
    logPanel.classList.toggle('open');
    collapsed._log = logPanel.classList.contains('open');
    saveCollapsed();
    if (logPanel.classList.contains('open')) logPanel.scrollTop = logPanel.scrollHeight;
    fitWindowHeight();
  });
  const resultPanel = document.getElementById('result-panel');
  const toast = document.getElementById('toast');
  var lastResultJa = '', lastResultEn = '';
  var whisperConfig = { binary: '', model: '', binary_variant: '', model_name: '' };
  var activeDownloads = {};
  var savedConfig = null; // snapshot of config at load time

  // --- SSE ---
  let evtSource = null;

  function connectSSE() {
    if (evtSource) evtSource.close();
    evtSource = new EventSource('/api/events');

    evtSource.addEventListener('status', function(e) {
      updateStatus(JSON.parse(e.data));
    });

    evtSource.addEventListener('log', function(e) {
      const d = JSON.parse(e.data);
      appendLog(d.message);
    });

    evtSource.addEventListener('download-progress', function(e) {
      var d = JSON.parse(e.data);
      handleDownloadProgress(d);
    });

    evtSource.onerror = function() {
      // Auto-reconnect is built into EventSource
    };
  }

  // --- Status ---
  function updateStatus(s) {
    // VBAN
    var vbanActive = s.vban.listening && s.vban.packetsPerSec > 0;
    setIndicator('vban-indicator', vbanActive);
    var vbanText = vbanActive ? s.vban.packetsPerSec + ' pkt/s' : 'offline';
    document.getElementById('vban-status').textContent = vbanText;

    // Level meter
    var peak = s.vban.peakLevel || 0;
    var pct = Math.min(100, peak * 100);
    var bar = document.getElementById('vban-level-bar');
    bar.style.width = pct + '%';
    bar.className = 'level-bar' + (peak > 0.95 ? ' clip' : peak > 0.5 ? ' hot' : '');
    var dbfs = peak > 0 ? (20 * Math.log10(peak)).toFixed(0) : '-inf';
    document.getElementById('vban-level-text').textContent = vbanActive ? dbfs + ' dBFS' : '';

    // OBS
    setIndicator('obs-indicator', s.obs.connected);
    document.getElementById('obs-status').textContent =
      s.obs.connected ? 'connected' : 'disconnected';

    // Whisper
    setIndicator('whisper-indicator', s.whisper.reachable);
    let wText = s.whisper.reachable ? 'ready' : 'unreachable';
    if (s.whisper.inferring) wText = 'inferring...';
    if (s.whisper.queueLength > 0) wText += ' (q=' + s.whisper.queueLength + ')';
    document.getElementById('whisper-status').textContent = wText;

    if (s.lastResult && s.lastResult.ja &&
        (s.lastResult.ja !== lastResultJa || s.lastResult.en !== lastResultEn)) {
      lastResultJa = s.lastResult.ja;
      lastResultEn = s.lastResult.en;
      var dict = i18n[currentLang] || i18n.en;
      resultPanel.innerHTML =
        '<div class="lang">' + escapeHtml(dict.lang_ja) + '</div>' +
        '<div class="text ja">' + escapeHtml(lastResultJa) + '</div>' +
        '<div class="lang">' + escapeHtml(dict.lang_en) + '</div>' +
        '<div class="text en">' + escapeHtml(lastResultEn) + '</div>';
    }
  }

  function setIndicator(id, on) {
    const el = document.getElementById(id);
    el.className = 'indicator ' + (on ? 'on' : 'off');
  }

  // --- Log ---
  function appendLog(msg) {
    const entry = document.createElement('div');
    entry.className = 'entry' + (msg.includes('Error') || msg.includes('failed') ? ' error' : '');
    const ts = document.createElement('span');
    ts.className = 'ts';
    ts.textContent = new Date().toLocaleTimeString('ja-JP', { hour12: false });
    entry.appendChild(ts);
    entry.appendChild(document.createTextNode(msg));
    logPanel.appendChild(entry);
    while (logPanel.children.length > MAX_LOG_ENTRIES) {
      logPanel.removeChild(logPanel.firstChild);
    }
    logPanel.scrollTop = logPanel.scrollHeight;
  }

  // --- Audio capture ---
  window.captureAudio = function() {
    var btn = document.getElementById('capture-btn');
    btn.disabled = true;
    btn.textContent = 'Recording...';
    fetch('/api/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ duration_ms: 5000 }),
    }).then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.error); });
      return r.blob();
    }).then(function(blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'vban-capture.wav';
      a.click();
      URL.revokeObjectURL(url);
      btn.textContent = 'Capture 5s WAV';
      btn.disabled = false;
    }).catch(function(e) {
      showToast('Capture failed: ' + e.message, true);
      btn.textContent = 'Capture 5s WAV';
      btn.disabled = false;
    });
  };

  // --- Config form ---
  function loadConfig() {
    fetch('/api/config')
      .then(function(r) { return r.json(); })
      .then(function(c) { fillForm(c); })
      .catch(function(e) { showToast('Failed to load config: ' + e.message, true); });
  }

  function fillForm(c) {
    document.getElementById('cfg-vban-port').value = c.vban.port;
    document.getElementById('cfg-vban-stream').value = c.vban.stream_name;
    document.getElementById('cfg-obs-host').value = c.obs.host;
    document.getElementById('cfg-obs-port').value = c.obs.port;
    document.getElementById('cfg-obs-password').value = c.obs.password;
    setSelectValue('cfg-obs-source-ja', c.obs.source_ja);
    setSelectValue('cfg-obs-source-en', c.obs.source_en);
    document.getElementById('cfg-obs-cc').checked = !!c.obs.closed_caption;
    document.getElementById('cfg-obs-cc-lang').value = c.obs.cc_language || 'en';
    // Merge with defaults to handle configs missing new fields
    whisperConfig = {
      binary: c.whisper.binary || '',
      model: c.whisper.model || '',
      binary_variant: c.whisper.binary_variant || '',
      model_name: c.whisper.model_name || '',
    };
    loadWhisperSetup();
    document.getElementById('cfg-subtitle-delay').value = c.subtitle.clear_delay;
    document.getElementById('cfg-subtitle-chars').value = c.subtitle.chars_per_line;
    document.getElementById('cfg-vad-threshold').value = c.vad.threshold;
    document.getElementById('cfg-vad-threshold-value').textContent = Number(c.vad.threshold).toFixed(2);
    document.getElementById('cfg-vad-min-speech').value = c.vad.min_speech_ms;
    document.getElementById('cfg-vad-max-speech').value = c.vad.max_speech_ms;
    var gateVal = (c.audio && c.audio.rms_gate_db) ?? -60;
    document.getElementById('cfg-audio-gate').value = gateVal;
    document.getElementById('cfg-audio-gate-value').textContent = String(gateVal);

    // Apply UI language override from config (empty = auto-detect from system)
    var overrideLang = (c.ui && c.ui.language) || '';
    var effectiveLang = overrideLang || (/^ja\b/i.test(navigator.language) ? 'ja' : 'en');
    if (effectiveLang !== currentLang) {
      currentLang = effectiveLang;
      applyI18n(currentLang);
    }

    // Auto-fetch OBS source candidates
    refreshSources();

    // Snapshot for change detection on save
    savedConfig = JSON.parse(JSON.stringify(c));
  }

  function setSelectValue(id, val) {
    var sel = document.getElementById(id);
    // Ensure the value exists as an option
    var found = false;
    for (var i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === val) { found = true; break; }
    }
    if (!found && val) {
      var opt = document.createElement('option');
      opt.value = val;
      opt.textContent = val;
      sel.appendChild(opt);
    }
    sel.value = val;
  }

  function refreshSources() {
    fetch('/api/obs/sources')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d.sources) return;
        populateSourceSelect('cfg-obs-source-ja', d.sources);
        populateSourceSelect('cfg-obs-source-en', d.sources);
      })
      .catch(function() { /* OBS not connected — ignore */ });
  }

  function populateSourceSelect(id, sources) {
    var sel = document.getElementById(id);
    var current = sel.value;
    sel.innerHTML = '<option value="">(none)</option>';

    sources.forEach(function(name) {
      var opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });
    setSelectValue(id, current);
  }

  function readForm() {
    return {
      vban: {
        port: parseInt(document.getElementById('cfg-vban-port').value, 10),
        stream_name: document.getElementById('cfg-vban-stream').value,
      },
      obs: {
        host: document.getElementById('cfg-obs-host').value,
        port: parseInt(document.getElementById('cfg-obs-port').value, 10),
        password: document.getElementById('cfg-obs-password').value,
        source_ja: document.getElementById('cfg-obs-source-ja').value,
        source_en: document.getElementById('cfg-obs-source-en').value,
        closed_caption: document.getElementById('cfg-obs-cc').checked,
        cc_language: document.getElementById('cfg-obs-cc-lang').value,
      },
      whisper: {
        server: 'http://127.0.0.1:8080',
        binary: whisperConfig.binary || '',
        model: whisperConfig.model || '',
        binary_variant: document.getElementById('cfg-whisper-variant').value,
        model_name: document.getElementById('cfg-whisper-model-select').value,
      },
      subtitle: {
        clear_delay: parseFloat(document.getElementById('cfg-subtitle-delay').value),
        chars_per_line: parseInt(document.getElementById('cfg-subtitle-chars').value, 10),
      },
      vad: {
        threshold: parseFloat(document.getElementById('cfg-vad-threshold').value),
        min_speech_ms: parseInt(document.getElementById('cfg-vad-min-speech').value, 10),
        max_speech_ms: parseInt(document.getElementById('cfg-vad-max-speech').value, 10),
      },
      audio: {
        rms_gate_db: parseFloat(document.getElementById('cfg-audio-gate').value),
        // Preserve existing value — edit config.local.toml to change
        normalize_target_dbfs: (savedConfig && savedConfig.audio && savedConfig.audio.normalize_target_dbfs) ?? -6,
      },
      ui: {
        // Preserve existing language override (read-only from UI — edit config.local.toml to change)
        language: (savedConfig && savedConfig.ui && savedConfig.ui.language) || '',
      },
    };
  }

  function getSaveMessage(newCfg) {
    if (!savedConfig) return 'Saved. Restart to apply.';
    var obsOnly = true;
    var obsChanged = false;
    var restartChanged = false;
    // Check OBS section
    var obsKeys = ['host', 'port', 'password', 'source_ja', 'source_en', 'closed_caption', 'cc_language'];
    for (var i = 0; i < obsKeys.length; i++) {
      if (String(newCfg.obs[obsKeys[i]]) !== String(savedConfig.obs[obsKeys[i]])) {
        obsChanged = true;
      }
    }
    // Check restart-requiring sections
    if (String(newCfg.vban.port) !== String(savedConfig.vban.port) ||
        newCfg.vban.stream_name !== savedConfig.vban.stream_name) restartChanged = true;
    var wKeys = ['binary_variant', 'model_name'];
    for (var i = 0; i < wKeys.length; i++) {
      if (String(newCfg.whisper[wKeys[i]]) !== String(savedConfig.whisper[wKeys[i]])) restartChanged = true;
    }
    if (String(newCfg.subtitle.clear_delay) !== String(savedConfig.subtitle.clear_delay) ||
        String(newCfg.subtitle.chars_per_line) !== String(savedConfig.subtitle.chars_per_line)) restartChanged = true;
    if (String(newCfg.vad.threshold) !== String(savedConfig.vad.threshold) ||
        String(newCfg.vad.min_speech_ms) !== String(savedConfig.vad.min_speech_ms) ||
        String(newCfg.vad.max_speech_ms) !== String(savedConfig.vad.max_speech_ms)) restartChanged = true;

    if (restartChanged && obsChanged) return 'Saved. Restart to apply. OBS: use Reconnect.';
    if (restartChanged) return 'Saved. Restart to apply.';
    if (obsChanged) return 'Saved. Use Reconnect to apply OBS changes.';
    return 'Saved.';
  }

  document.getElementById('config-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('save-btn');
    btn.disabled = true;
    var formData = readForm();

    fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData),
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.error); });
      return r.json();
    })
    .then(function() {
      var msg = getSaveMessage(formData);
      savedConfig = JSON.parse(JSON.stringify(formData));
      showToast(msg);
    })
    .catch(function(e) {
      showToast(e.message, true);
    })
    .finally(function() {
      btn.disabled = false;
    });
  });

  document.getElementById('reload-btn').addEventListener('click', function() {
    loadConfig();
    showToast('Config reloaded from server.');
  });

  document.getElementById('refresh-sources-btn').addEventListener('click', function() {
    refreshSources();
    showToast('Sources refreshed.');
  });

  document.getElementById('reconnect-obs-btn').addEventListener('click', function() {
    var btn = this;
    btn.disabled = true;
    fetch('/api/obs/reconnect', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.connected) {
          showToast('OBS connected.');
          refreshSources();
        } else {
          showToast('OBS connection failed: ' + (d.error || 'unknown'), true);
        }
      })
      .catch(function(e) { showToast('OBS reconnect failed: ' + e.message, true); })
      .finally(function() { btn.disabled = false; });
  });

  // --- Whisper setup ---
  function loadWhisperSetup() {
    fetch('/api/whisper/variants')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var sel = document.getElementById('cfg-whisper-variant');
        sel.innerHTML = '';
        d.variants.forEach(function(v) {
          var opt = document.createElement('option');
          opt.value = v.id;
          var label = v.label;
          if (v.id === d.recommended) label += ' (recommended)';
          if (d.installed[v.id]) label += ' [installed]';
          opt.textContent = label;
          sel.appendChild(opt);
        });
        // Select current variant
        if (whisperConfig.binary_variant) {
          sel.value = whisperConfig.binary_variant;
        } else if (d.recommended) {
          sel.value = d.recommended;
        }
        updateBinaryStatus(d.installed);
      })
      .catch(function() {});

    fetch('/api/whisper/models')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var sel = document.getElementById('cfg-whisper-model-select');
        sel.innerHTML = '';
        d.models.forEach(function(m) {
          var opt = document.createElement('option');
          opt.value = m.id;
          var label = m.label;
          if (d.installed[m.id]) label += ' [installed]';
          opt.textContent = label;
          sel.appendChild(opt);
        });
        if (whisperConfig.model_name) {
          sel.value = whisperConfig.model_name;
        }
        updateModelStatus(d.installed);
      })
      .catch(function() {});
  }

  function updateBinaryStatus(installed) {
    var sel = document.getElementById('cfg-whisper-variant');
    var btn = document.getElementById('download-binary-btn');
    if (installed && installed[sel.value]) {
      btn.textContent = 'Installed';
      btn.disabled = true;
    } else {
      btn.textContent = 'Download';
      btn.disabled = false;
    }
  }

  function updateModelStatus(installed) {
    var sel = document.getElementById('cfg-whisper-model-select');
    var btn = document.getElementById('download-model-btn');
    if (installed && installed[sel.value]) {
      btn.textContent = 'Installed';
      btn.disabled = true;
    } else {
      btn.textContent = 'Download';
      btn.disabled = false;
    }
  }

  document.getElementById('download-binary-btn').addEventListener('click', function() {
    var variant = document.getElementById('cfg-whisper-variant').value;
    if (!variant) return;
    var btn = this;
    btn.disabled = true;
    fetch('/api/whisper/download-binary', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ variant: variant }),
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.error); });
      return r.json();
    })
    .then(function(d) { addProgressBar(d.id, 'Binary: ' + variant); })
    .catch(function(e) {
      btn.disabled = false;
      showToast('Download failed: ' + e.message, true);
    });
  });

  document.getElementById('download-model-btn').addEventListener('click', function() {
    var model = document.getElementById('cfg-whisper-model-select').value;
    if (!model) return;
    var btn = this;
    btn.disabled = true;
    fetch('/api/whisper/download-model', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: model }),
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.error); });
      return r.json();
    })
    .then(function(d) { addProgressBar(d.id, 'Model: ' + model); })
    .catch(function(e) {
      btn.disabled = false;
      showToast('Download failed: ' + e.message, true);
    });
  });

  function addProgressBar(id, title) {
    activeDownloads[id] = true;
    var container = document.getElementById('download-progress-container');
    var el = document.createElement('div');
    el.id = 'dl-' + id;
    el.innerHTML = '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">'
      + '<div style="flex:1;font-size:11px;color:#9999bb;" class="dl-label">' + escapeHtml(title) + '</div>'
      + '<span style="font-size:12px;color:#dc2626;cursor:pointer;line-height:1;" onclick="cancelDownload(\'' + id + '\')" title="Cancel download">&times;</span>'
      + '</div>'
      + '<div style="background:#0f1629;border-radius:4px;height:6px;overflow:hidden;">'
      + '<div class="dl-bar" style="height:100%;background:#6366f1;width:0%;transition:width 0.3s;"></div>'
      + '</div>'
      + '<div style="font-size:10px;color:#666;margin-top:2px;" class="dl-detail"></div>';
    container.appendChild(el);
  }

  window.cancelDownload = function(id) {
    fetch('/api/whisper/download-cancel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id }),
    }).catch(function() {});
  };

  function removeProgressBar(id) {
    delete activeDownloads[id];
    var el = document.getElementById('dl-' + id);
    if (el) el.remove();
  }

  function handleDownloadProgress(d) {
    if (!activeDownloads[d.id]) return;
    var el = document.getElementById('dl-' + d.id);
    if (!el) return;
    var bar = el.querySelector('.dl-bar');
    var label = el.querySelector('.dl-label');
    var detail = el.querySelector('.dl-detail');

    if (d.phase === 'downloading') {
      bar.style.width = d.percent + '%';
      label.textContent = d.label;
      var mb = (d.bytesDownloaded / 1048576).toFixed(1);
      var totalMb = d.bytesTotal > 0 ? (d.bytesTotal / 1048576).toFixed(1) : '?';
      detail.textContent = mb + ' / ' + totalMb + ' MB (' + d.percent + '%)';
    } else if (d.phase === 'extracting') {
      label.textContent = 'Extracting...';
      bar.style.width = '100%';
      detail.textContent = '';
    } else if (d.phase === 'verifying') {
      label.textContent = 'Verifying checksum...';
      bar.style.width = '100%';
      detail.textContent = '';
    } else if (d.phase === 'done') {
      removeProgressBar(d.id);
      showToast('Download complete! Restart to apply.');
      // Refresh whisperConfig from server (download auto-saves config)
      fetch('/api/config').then(function(r) { return r.json(); }).then(function(c) {
        whisperConfig = {
          binary: c.whisper.binary || '',
          model: c.whisper.model || '',
          binary_variant: c.whisper.binary_variant || '',
          model_name: c.whisper.model_name || '',
        };
        loadWhisperSetup();
      }).catch(function() { loadWhisperSetup(); });
    } else if (d.phase === 'error') {
      removeProgressBar(d.id);
      if (d.label && d.label.indexOf('aborted') !== -1) {
        showToast('Download cancelled.');
      } else {
        showToast('Download error: ' + d.label, true);
      }
      loadWhisperSetup();
    }
  }

  document.getElementById('cfg-vad-threshold').addEventListener('input', function() {
    document.getElementById('cfg-vad-threshold-value').textContent = Number(this.value).toFixed(2);
  });

  document.getElementById('cfg-audio-gate').addEventListener('input', function() {
    document.getElementById('cfg-audio-gate-value').textContent = String(this.value);
  });

  document.getElementById('cfg-whisper-variant').addEventListener('change', function() {
    fetch('/api/whisper/variants')
      .then(function(r) { return r.json(); })
      .then(function(d) { updateBinaryStatus(d.installed); })
      .catch(function() {});
  });

  document.getElementById('cfg-whisper-model-select').addEventListener('change', function() {
    fetch('/api/whisper/models')
      .then(function(r) { return r.json(); })
      .then(function(d) { updateModelStatus(d.installed); })
      .catch(function() {});
  });

  // --- Toast ---
  var toastTimer = null;
  function showToast(msg, isError) {
    toast.textContent = msg;
    toast.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      toast.className = 'toast';
    }, 3000);
  }

  var escapeMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
  function escapeHtml(str) {
    return str.replace(/[&<>"]/g, function(ch) { return escapeMap[ch]; });
  }

  // --- Init ---
  connectSSE();
  loadConfig();
})();
</script>
</body>
</html>
